name: MCPTray
options:
  bundleIdPrefix: io.github.d1coach
  deploymentTarget:
    macOS: "26.0"
  createIntermediateGroups: true
  developmentLanguage: en

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "26.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    PRODUCT_NAME: MCPTray
    ENABLE_HARDENED_RUNTIME: NO
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "-"
    DEVELOPMENT_TEAM: ""
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_LSUIElement: YES
    INFOPLIST_KEY_NSHumanReadableCopyright: "MCPTray"
    INFOPLIST_KEY_CFBundleDisplayName: "MCPTray"
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    SWIFT_STRICT_CONCURRENCY: minimal

packages:
  TOMLKit:
    url: https://github.com/LebJe/TOMLKit
    from: 0.6.0

targets:
  MCPTray:
    type: application
    platform: macOS
    sources:
      - path: MCPTray
    dependencies:
      - package: TOMLKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.github.d1coach.mcptray
